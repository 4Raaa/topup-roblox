<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot - Final</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{background:#1a1a2e;height:100vh;display:flex;justify-content:center;align-items:center;}
        .chat-container{width:400px;background:white;border-radius:20px;display:flex;flex-direction:column;height:600px;}
        .header{background:#0f3460;color:white;padding:15px;text-align:center;border-radius:20px 20px 0 0;}
        .api-row{padding:10px;background:#f0f0f0;display:flex;gap:5px;}
        .api-row input{flex:1;padding:5px;border:1px solid #ccc;border-radius:5px;}
        .messages{flex:1;padding:15px;overflow-y:auto;background:#f9f9f9;display:flex;flex-direction:column;}
        .message{margin-bottom:10px;display:flex;flex-direction:column;}
        .message.user{align-items:flex-end;}
        .message.bot{align-items:flex-start;}
        .bubble{max-width:80%;padding:10px 15px;border-radius:18px;word-wrap:break-word;}
        .user .bubble{background:#0f3460;color:white;border-bottom-right-radius:5px;}
        .bot .bubble{background:#e5e5ea;color:black;border-bottom-left-radius:5px;}
        .timestamp{font-size:0.7rem;color:#888;margin-top:4px;}
        .input-area{display:flex;padding:10px;border-top:1px solid #ddd;}
        #input{flex:1;padding:10px;border:1px solid #ddd;border-radius:25px;outline:none;}
        #send{background:#0f3460;color:white;border:none;width:45px;height:45px;border-radius:50%;margin-left:8px;cursor:pointer;}
        .typing{display:none;background:#e5e5ea;padding:10px 15px;border-radius:18px;margin-bottom:10px;align-self:flex-start;}
        .typing span{display:inline-block;width:8px;height:8px;background:#888;border-radius:50%;margin-right:4px;animation:typing 1.3s infinite;}
        @keyframes typing{0%,60%,100%{opacity:0.3;}30%{opacity:1;}}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">🤖 AI Chatbot (Gemini 1.5 Flash)</div>
        <div class="api-row">
            <input type="text" id="apiKey" placeholder="API Key" value="AIzaSyBsIBOlyJyx93xBg9JbgkG_xf_ls8VmkhM">
            <button id="testBtn" style="padding:5px 10px;">Test</button>
        </div>
        <div class="messages" id="messages">
            <div class="message bot"><div class="bubble">Masukkan API Key, lalu test koneksi.</div><div class="timestamp"></div></div>
        </div>
        <div class="typing" id="typing"><span></span><span></span><span></span></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Ketik pesan...">
            <button id="send">➤</button>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const messagesDiv = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const inputField = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const testBtn = document.getElementById('testBtn');

        function addMessage(text, sender, isError = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (isError) bubble.style.background = '#ffebee';
            bubble.textContent = text;
            const time = document.createElement('div');
            time.className = 'timestamp';
            time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            msgDiv.appendChild(bubble);
            msgDiv.appendChild(time);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function callGemini(prompt) {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) throw new Error('API Key kosong');
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(`${res.status}: ${err}`);
            }
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            inputField.value = '';
            typingDiv.style.display = 'flex';
            sendBtn.disabled = true;
            try {
                const reply = await callGemini(text);
                addMessage(reply, 'bot');
            } catch (e) {
                addMessage('Error: ' + e.message, 'bot', true);
            } finally {
                typingDiv.style.display = 'none';
                sendBtn.disabled = false;
                inputField.focus();
            }
        }

        async function testConnection() {
            typingDiv.style.display = 'flex';
            testBtn.disabled = true;
            try {
                const reply = await callGemini('Halo, balas dengan "OK"');
                addMessage('✅ Test berhasil: ' + reply, 'bot');
            } catch (e) {
                addMessage('❌ Test gagal: ' + e.message, 'bot', true);
            } finally {
                typingDiv.style.display = 'none';
                testBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        testBtn.addEventListener('click', testConnection);
    </script>
</body>
</html>
