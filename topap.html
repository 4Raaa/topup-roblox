<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Top-Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0F1113; }
        .card-premium {
            background: linear-gradient(145deg, #1e2024, #121416);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .card-premium:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        .glow-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .btn-buy {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
        }
    </style>
</head>
<body class="text-white min-h-screen">

    <nav class="sticky top-0 z-50 p-4 border-b border-gray-800 bg-[#16181A]/90 backdrop-blur-md flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <span class="font-black text-xl tracking-tighter italic">Roblox</span>
        </div>
        <div class="hidden md:flex items-center space-x-6 text-sm font-medium text-gray-400">
            <a href="#" class="hover:text-blue-500">Beranda</a>
            <a href="#" class="hover:text-blue-500">Testimoni</a>
            <a href="#" class="hover:text-blue-500">Cek Pesanan</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-12">
        <div class="max-w-3xl mx-auto text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-black mb-4 glow-text tracking-tight">TOP UP ROBLOX</h1>
            <p class="text-gray-400 text-lg">Proses  1-30 menit.</p>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 max-w-7xl mx-auto">
            
            <script>
                const data = [
                    {rbx: "80", price: "12.500", old: "15.000"},
                    {rbx: "200", price: "32.000", old: "38.000"},
                    {rbx: "400", price: "62.000", old: "75.000"},
                    {rbx: "800", price: "124.000", old: "150.000", best: true},
                    {rbx: "1,200", price: "185.000", old: "210.000"},
                    {rbx: "1,700", price: "260.000", old: "300.000", hot: true},
                    {rbx: "2,000", price: "310.000", old: "350.000"},
                    {rbx: "3,000", price: "460.000", old: "520.000"},
                    {rbx: "4,500", price: "680.000", old: "780.000"},
                    {rbx: "10,000", price: "1.450.000", old: "1.700.000"},
                    {rbx: "15,000", price: "2.100.000", old: "2.500.000"},
                    {rbx: "22,500", price: "3.150.000", old: "3.800.000"}
                ];

                document.write(data.map(item => `
                    <div class="card-premium p-5 rounded-2xl flex flex-col items-center text-center relative overflow-hidden">
                        ${item.best ? '<span class="absolute top-2 right-2 bg-green-500 text-[10px] px-2 py-1 rounded font-bold">BEST SELLER</span>' : ''}
                        ${item.hot ? '<span class="absolute top-2 right-2 bg-red-500 text-[10px] px-2 py-1 rounded font-bold">HOT DEAL</span>' : ''}
                        
                        <img src="logo-roblox.png" alt="Robux" class="w-16 mb-4 drop-shadow-2xl">
                        <h3 class="text-lg font-bold">${item.rbx} Robux</h3>
                        <div class="mt-2">
                            <p class="text-blue-400 font-bold text-lg leading-none">Rp ${item.price}</p>
                            <p class="text-[10px] text-gray-500 line-through mt-1 italic">Rp ${item.old}</p>
                        </div>
                        <button onclick="bayar('${item.rbx} Robux', '${item.price}')" class="btn-buy mt-5 w-full py-2.5 rounded-xl font-extrabold text-sm tracking-wide hover:brightness-110 transition shadow-lg">BELI</button>
                    </div>
                `).join(''));
            </script>

        </div>

        <div class="mt-20 grid md:grid-cols-2 gap-8 max-w-6xl mx-auto border-t border-gray-800 pt-10">
            <div class="bg-[#16181A] p-6 rounded-2xl border border-gray-800">
                <h4 class="text-lg font-bold mb-4 flex items-center text-blue-500">
                    <i class="fas fa-check-circle mr-2"></i> Keuntungan RO-FAST
                </h4>
                <ul class="text-sm text-gray-400 space-y-3">
                    <li><i class="fas fa-bolt mr-2 text-yellow-500"></i>Cepat satset</li>
                    <li><i class="fas fa-lock mr-2 text-green-500"></i> Keamanan Akun Terjamin 100%</li>
                    <li><i class="fas fa-headset mr-2 text-blue-500"></i> Layanan CS 24/7 Aktif</li>
                </ul>
            </div>
            
            <div class="bg-[#16181A] p-6 rounded-2xl border border-gray-800">
                <h4 class="text-lg font-bold mb-4 flex items-center text-blue-500">
                    <i class="fas fa-credit-card mr-2"></i> Metode Pembayaran
                </h4>
                <div class="grid grid-cols-4 gap-3 grayscale opacity-70">
                    <div class="bg-white p-1 rounded h-8 flex items-center justify-center"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPNGCiK6H0dw4Z-J8pVUtGqRNOZ7S7p2jcqA&s" class="h-4"></div>
                    <div class="bg-white p-1 rounded h-8 flex items-center justify-center"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQuUZVdeiUB_55qfLVb7doFVTPt7kKWYdNFcQc881ZJztGnrWunQ16oXhg&s=10" class="h-4"></div>
                    <div class="bg-white p-1 rounded h-8 flex items-center justify-center"><img src="https://www.linkqu.id/wp-content/uploads/2021/07/filedownload.png" class="h-4"></div>
                    <div class="bg-white p-1 rounded h-8 flex items-center justify-center"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" class="h-4"></div>
                </div>
                <p class="text-[10px] text-gray-500 mt-4 text-center">Mendukung QRIS, E-Wallet, dan Virtual Account</p>
            </div>
        </div>
    </div>

    <script>
        function bayar(item, harga) {
            // Animasi Loading sebelum alert
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Processing...";
            btn.disabled = true;

            setTimeout(() => {
                alert(`⚠️ SISTEM BUSY\n\nMetode pembayaran untuk paket ${item} sedang mengalami gangguan teknis (Maintenance).\n\nSilahkan coba lagi dalam 15-30 menit.`);
                btn.innerText = originalText;
                btn.disabled = false;
            }, 800);
        }
    </script>
</body>
</html>
