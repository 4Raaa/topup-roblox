<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Debug Mode</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
        body{background:linear-gradient(135deg,#1a1a2e,#16213e);height:100vh;display:flex;justify-content:center;align-items:center;}
        .chat-container{width:450px;max-width:95%;background:white;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.2);overflow:hidden;display:flex;flex-direction:column;height:650px;}
        .chat-header{background:#0f3460;color:white;padding:15px;text-align:center;font-weight:bold;font-size:1.2rem;}
        .config-panel{padding:10px;background:#f0f0f0;border-bottom:1px solid #ddd;display:flex;flex-direction:column;gap:5px;}
        .config-row{display:flex;align-items:center;gap:5px;font-size:0.9rem;}
        .config-row input[type="text"]{flex:1;padding:5px;border:1px solid #ccc;border-radius:5px;background:#e8e8e8;color:#333;font-size:0.85rem;}
        .config-row select{padding:5px;border-radius:5px;border:1px solid #ccc;}
        .debug-btn{background:#4CAF50;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:0.8rem;}
        .debug-btn:hover{background:#45a049;}
        .chat-messages{flex:1;padding:15px;overflow-y:auto;background:#f9f9f9;display:flex;flex-direction:column;}
        .message{margin-bottom:15px;display:flex;flex-direction:column;}
        .message.user{align-items:flex-end;}
        .message.bot{align-items:flex-start;}
        .message .bubble{max-width:80%;padding:10px 15px;border-radius:18px;word-wrap:break-word;line-height:1.4;}
        .user .bubble{background:#0f3460;color:white;border-bottom-right-radius:5px;}
        .bot .bubble{background:#e5e5ea;color:black;border-bottom-left-radius:5px;}
        .timestamp{font-size:0.7rem;color:#888;margin-top:4px;margin-left:5px;margin-right:5px;}
        .chat-input-area{display:flex;padding:10px;background:white;border-top:1px solid #ddd;}
        #user-input{flex:1;padding:10px 15px;border:1px solid #ddd;border-radius:25px;outline:none;font-size:1rem;}
        #user-input:focus{border-color:#0f3460;}
        #send-btn{background:#0f3460;color:white;border:none;width:45px;height:45px;border-radius:50%;margin-left:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        #send-btn:hover{background:#1a4b8c;}
        #send-btn:disabled{background:#ccc;cursor:not-allowed;}
        .typing-indicator{display:none;background:#e5e5ea;padding:10px 15px;border-radius:18px;border-bottom-left-radius:5px;margin-bottom:10px;align-self:flex-start;}
        .typing-indicator span{height:8px;width:8px;background:#888;border-radius:50%;display:inline-block;margin-right:4px;animation:typing 1.3s linear infinite;}
        .typing-indicator span:nth-child(2){animation-delay:0.2s;}
        .typing-indicator span:nth-child(3){animation-delay:0.4s;}
        @keyframes typing{0%{opacity:0.3;transform:scale(1);}50%{opacity:1;transform:scale(1.2);}100%{opacity:0.3;transform:scale(1);}}
        .error-detail{background:#ffebee;color:#c62828;padding:8px;border-radius:5px;margin:5px 0;font-size:0.85rem;border-left:3px solid #c62828;}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🤖 AI Chatbot (Gemini Debug)</div>
        <div class="config-panel">
            <div class="config-row">
                <span style="min-width:60px;">🔑 API Key:</span>
                <input type="text" id="api-key-input" value="AIzaSyBsIBOlyJyx93xBg9JbgkG_xf_ls8VmkhM" readonly>
            </div>
            <div class="config-row">
                <span style="min-width:60px;">📦 Model:</span>
                <select id="model-select">
                    <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                    <option value="gemini-pro">Gemini Pro (legacy)</option>
                </select>
                <button class="debug-btn" id="test-connection">Test Koneksi</button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot"><div class="bubble">Halo! Ada yang bisa saya bantu?</div><div class="timestamp" id="timestamp-bot"></div></div>
        </div>
        <div class="typing-indicator" id="typing-indicator"><span></span><span></span><span></span></div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ketik pesan..." autocomplete="off">
            <button id="send-btn" aria-label="Kirim"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const apiKeyInput = document.getElementById('api-key-input');
        const modelSelect = document.getElementById('model-select');
        const testBtn = document.getElementById('test-connection');

        function addMessage(text, sender, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            if (isError) bubble.style.background = '#ffebee';
            bubble.textContent = text;
            const timestamp = document.createElement('div');
            timestamp.classList.add('timestamp');
            const now = new Date();
            timestamp.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            messageDiv.appendChild(bubble);
            messageDiv.appendChild(timestamp);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function callGemini(prompt) {
            const apiKey = apiKeyInput.value.trim();
            const model = modelSelect.value;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                let errorMsg = `HTTP ${response.status}`;
                try {
                    const errorJson = JSON.parse(errorText);
                    errorMsg = errorJson.error?.message || errorText;
                } catch {
                    errorMsg = errorText || response.statusText;
                }
                throw new Error(`${response.status}: ${errorMsg}`);
            }
            return await response.json();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (message === '') return;
            
            addMessage(message, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            typingIndicator.style.display = 'flex';

            try {
                const data = await callGemini(message);
                const botReply = data.candidates[0].content.parts[0].text;
                typingIndicator.style.display = 'none';
                addMessage(botReply, 'bot');
            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessage('❌ Error: ' + error.message, 'bot', true);
                console.error('Full error:', error);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        async function testConnection() {
            testBtn.disabled = true;
            testBtn.textContent = 'Testing...';
            try {
                const data = await callGemini('Halo, balas dengan "OK"');
                if (data.candidates && data.candidates[0]) {
                    addMessage('✅ Koneksi sukses! Respon: ' + data.candidates[0].content.parts[0].text, 'bot');
                } else {
                    addMessage('⚠️ Respon tidak sesuai format', 'bot', true);
                }
            } catch (error) {
                addMessage('❌ Gagal: ' + error.message, 'bot', true);
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = 'Test Koneksi';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
        testBtn.addEventListener('click', testConnection);

        const date = new Date();
        document.getElementById('timestamp-bot').textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    </script>
</body>
</html>
