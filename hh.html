<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REZX AI - TOP4TOP BYPASS V2</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: 'Consolas', monospace; 
            background: #050505; 
            color: #00ff41; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
        }
        .panel { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(10, 10, 10, 0.9); 
            padding: 20px; 
            border: 1px solid #00ff41; 
            box-shadow: 0 0 20px #00ff4133;
            border-radius: 4px;
        }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        .header h1 { font-size: 1.1rem; margin: 0; letter-spacing: 3px; }
        
        .upload-area { border: 1px dashed #333; padding: 20px; text-align: center; margin-bottom: 15px; transition: 0.3s; }
        .upload-area:hover { border-color: #00ff41; }
        
        input[type="file"] { display: none; }
        .file-label { cursor: pointer; color: #888; font-size: 0.9rem; }
        
        button { 
            width: 100%; 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { background: #00cc33; box-shadow: 0 0 10px #00ff41; }

        #terminal { 
            margin-top: 15px; 
            height: 150px; 
            background: #000; 
            border: 1px solid #222; 
            padding: 10px; 
            font-size: 0.75rem; 
            overflow-y: auto;
            color: #aaa;
        }
        .log-in { color: #00ff41; margin-bottom: 5px; }
        .log-err { color: #ff3131; }
        .log-link { color: #00acee; word-break: break-all; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel">
    <div class="header">
        <h1>REZX MULTI UPLOAD</h1>
    </div>

    <div class="upload-area" onclick="document.getElementById('audioFiles').click()">
        <span class="file-label" id="fileCount">[ KLIK UNTUK PILIH FILE ]</span>
        <input type="file" id="audioFiles" accept="audio/*" multiple onchange="updateCount()">
    </div>

    <button onclick="runExploit()">Execute Upload</button>

    <div id="terminal">System Ready...<br>>_</div>
</div>

<script>
function updateCount() {
    const input = document.getElementById('audioFiles');
    document.getElementById('fileCount').innerText = input.files.length + " File dipilih";
}

async function runExploit() {
    const fileInput = document.getElementById('audioFiles');
    const term = document.getElementById('terminal');
    const files = fileInput.files;

    if (files.length === 0) {
        term.innerHTML += "<div class='log-err'>> Error: No file selected.</div>";
        return;
    }

    term.innerHTML = "<b>[!] Starting Injection Sequence...</b><br>";

    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const formData = new FormData();
        formData.append('file_0_', file);
        formData.append('submit-btn', 'رفع الملفات');

        term.innerHTML += `<div>> Processing: ${file.name}</div>`;
        term.scrollTop = term.scrollHeight;

        try {
            // Tembak langsung tanpa proxy biar gak kena 403
            const response = await fetch('https://top4top.io', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const html = await response.text();
                // Scrape link mp3 dari hasil response top4top
                const match = html.match(/https:\/\/f\.top4top\.io\/m_[a-zA-Z0-9]+\.mp3/);
                
                if (match) {
                    term.innerHTML += `<div class='log-in'>> Success! Link:</div>`;
                    term.innerHTML += `<div class='log-link' onclick="window.open('${match[0]}')">${match[0]}</div>`;
                } else {
                    term.innerHTML += `<div class='log-err'>> Gagal ambil link. Server menolak.</div>`;
                }
            } else {
                term.innerHTML += `<div class='log-err'>> HTTP Error: ${response.status}. Aktifkan Ekstensi CORS!</div>`;
            }
        } catch (e) {
            term.innerHTML += `<div class='log-err'>> Connection Blocked. Gunakan ekstensi Allow-CORS.</div>`;
        }
        term.scrollTop = term.scrollHeight;
    }
}
</script>

</body>
</html>
